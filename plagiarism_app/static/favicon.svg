<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Rounded background with brand gradient -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Subtle glass shine -->
  <rect width="64" height="32" rx="14" fill="url(#shine)"/>

  <!-- Shield shape (represents protection/originality) -->
  <path d="M32 10 L48 18 L48 34 C48 44 40 50 32 54 C24 50 16 44 16 34 L16 18 Z"
        fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round" opacity="0.95"/>

  <!-- Checkmark inside shield (plagiarism cleared) -->
  <path d="M23 32 L29 38 L41 24"
        fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small "AI" text at bottom -->
  <text x="32" y="60" text-anchor="middle" font-family="Inter, Arial, sans-serif"
        font-size="7" font-weight="800" fill="rgba(255,255,255,0.8)" letter-spacing="1.5">AI</text>
</svg>
