<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Plagiarism AI</title>
  <meta name="description" content="AI Content Authenticity Tool" />
  <meta name="author" content="Plagiarism AI" />

  <meta property="og:title" content="Plagiarism AI" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/og-image.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@PlagiarismAI" />
  <meta name="twitter:image" content="/og-image.png" />
</head>


<body>
  <div id="root">
    <style>
      .app-preloader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #FAFAFA;
        z-index: 9999;
        font-family: system-ui, -apple-system, sans-serif;
      }

      .app-preloader-circle-container {
        position: relative;
        width: 72px;
        height: 72px;
        margin-bottom: 24px;
      }

      .app-preloader-circle-outer {
        position: absolute;
        inset: 0;
        border: 4px solid transparent;
        border-top-color: #2563EB;
        border-right-color: #3B82F6;
        border-bottom-color: transparent;
        border-left-color: transparent;
        border-radius: 50%;
        animation: app-preloader-spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      }

      .app-preloader-circle-inner {
        position: absolute;
        inset: 12px;
        border: 4px solid transparent;
        border-top-color: #4F46E5;
        border-left-color: #6366F1;
        border-bottom-color: transparent;
        border-right-color: transparent;
        border-radius: 50%;
        animation: app-preloader-spin-reverse 0.9s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      }

      .app-preloader-text {
        color: #475569;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        animation: app-preloader-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      @keyframes app-preloader-spin {
        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes app-preloader-spin-reverse {
        100% {
          transform: rotate(-360deg);
        }
      }

      @keyframes app-preloader-pulse {

        0%,
        100% {
          opacity: 1;
        }

        50% {
          opacity: 0.5;
        }
      }
    </style>
    <div class="app-preloader">
      <div class="app-preloader-circle-container">
        <div class="app-preloader-circle-outer"></div>
        <div class="app-preloader-circle-inner"></div>
      </div>
      <div class="app-preloader-text">Starting Plagiarism AI...</div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
